name: Create GitHub Release

on:
  # Run on demand
  workflow_dispatch:

  # Run on push to main when .bumpversion.cfg version is updated
  push:
    branches:
      - main
      - master
    paths:
      - .bumpversion.cfg

jobs:
  release:
    uses: plus3it/actions-workflows/.github/workflows/release.yml@7a39c78aa90050c7d705f28fe93d18ae139cdc05
    secrets:
      release-token: ${{ secrets.GH_RELEASES_TOKEN }}
